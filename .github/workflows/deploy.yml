name: Deploy to Cloud Run

on:
  push:
    tags:
      - '*.*.*-dev'
      - '*.*.*'        # prod (bare semver)

jobs:
  # ────────────────────────────────────────────────
  # 1. Backend API (Python / FastAPI)
  # ────────────────────────────────────────────────
  deploy-api:
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.get_url.outputs.api_url }}
      environment: ${{ steps.vars.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Set version & environment
        id: vars
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$VERSION" == *"-dev" ]]; then ENVIRONMENT=dev; else ENVIRONMENT=prod; fi
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT"   >> "$GITHUB_OUTPUT"

      - name: Authenticate with GCP
        run: |
          echo "${{ secrets.ADANICO_GCP_SA_KEY }}" | base64 --decode > gcp-key.json
          gcloud auth activate-service-account --key-file=gcp-key.json
          gcloud config set project adanico-labs

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & push API image
        run: |
          IMAGE="us-central1-docker.pkg.dev/adanico-labs/adanico-repo/ofta-api:${{ steps.vars.outputs.version }}"
          cd backend
          gcloud builds submit --tag "$IMAGE"

      - name: Deploy API to Cloud Run
        run: |
          SERVICE="ofta-api-${{ steps.vars.outputs.environment }}"
          IMAGE="us-central1-docker.pkg.dev/adanico-labs/adanico-repo/ofta-api:${{ steps.vars.outputs.version }}"
          gcloud run deploy "$SERVICE" \
            --image="$IMAGE" \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --set-env-vars="\
              ENVIRONMENT=${{ steps.vars.outputs.environment }},\
              TASC_DB_HOST=${{ secrets.TASC_DB_HOST }},\
              TASC_DB_PORT=${{ secrets.TASC_DB_PORT }},\
              TASC_DB_NAME=${{ secrets.TASC_DB_NAME }},\
              TASC_DB_USERNAME=${{ secrets.TASC_DB_USERNAME }},\
              TASC_DB_PASSWORD=${{ secrets.TASC_DB_PASSWORD }},\
              FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }},\
              ALLOWED_ORIGINS=capacitor://localhost,https://localhost"

      - name: Get API URL
        id: get_url
        run: |
          URL=$(gcloud run services describe "ofta-api-${{ steps.vars.outputs.environment }}" \
            --region=us-central1 --format="value(status.url)")
          echo "api_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Remove GCP key file
        if: always()
        run: rm -f gcp-key.json

  # ────────────────────────────────────────────────
  # 2. Web app (Next.js static → Cloud Run)
  # ────────────────────────────────────────────────
  deploy-web:
    needs: deploy-api
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version & environment
        id: vars
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$VERSION" == *"-dev" ]]; then ENVIRONMENT=dev; else ENVIRONMENT=prod; fi
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT"   >> "$GITHUB_OUTPUT"

      - name: Authenticate with GCP
        run: |
          echo "${{ secrets.ADANICO_GCP_SA_KEY }}" | base64 --decode > gcp-key.json
          gcloud auth activate-service-account --key-file=gcp-key.json
          gcloud config set project adanico-labs

      - name: Build & push web image
        run: |
          IMAGE="us-central1-docker.pkg.dev/adanico-labs/adanico-repo/ofta-web:${{ steps.vars.outputs.version }}"
          cd mobile
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE_URI=$IMAGE,\
              _API_URL=${{ needs.deploy-api.outputs.api_url }},\
              _FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }},\
              _FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }},\
              _FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }},\
              _FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }},\
              _FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}"

      - name: Deploy web to Cloud Run
        run: |
          SERVICE="ofta-web-${{ steps.vars.outputs.environment }}"
          IMAGE="us-central1-docker.pkg.dev/adanico-labs/adanico-repo/ofta-web:${{ steps.vars.outputs.version }}"
          gcloud run deploy "$SERVICE" \
            --image="$IMAGE" \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --port=3100

      - name: Remove GCP key file
        if: always()
        run: rm -f gcp-key.json
